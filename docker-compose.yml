services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    networks:
      - app-network

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    environment:
      - BACKEND_HOST=backend
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
