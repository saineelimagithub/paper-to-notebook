name: CD — Build & Deploy to AWS ECS

on:
  push:
    branches: [master, main]

jobs:
  # Only deploy after CI passes
  deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest
    needs: []  # Add CI job references when wiring up
    if: github.event_name == 'push'

    env:
      AWS_REGION: us-east-1
      ECR_BACKEND: paper-to-notebook/backend
      ECR_FRONTEND: paper-to-notebook/frontend
      ECS_CLUSTER: paper-to-notebook
      ECS_SERVICE: paper-to-notebook

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag & push backend image
        run: |
          IMAGE="${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_BACKEND }}:${{ github.sha }}"
          docker build -t "$IMAGE" ./backend
          docker tag "$IMAGE" "${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_BACKEND }}:latest"
          docker push "$IMAGE"
          docker push "${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_BACKEND }}:latest"

      - name: Build, tag & push frontend image
        run: |
          IMAGE="${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_FRONTEND }}:${{ github.sha }}"
          docker build -t "$IMAGE" ./frontend
          docker tag "$IMAGE" "${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_FRONTEND }}:latest"
          docker push "$IMAGE"
          docker push "${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_FRONTEND }}:latest"

      - name: Deploy to ECS (force new deployment)
        run: |
          aws ecs update-service \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --service "${{ env.ECS_SERVICE }}" \
            --force-new-deployment \
            --region "${{ env.AWS_REGION }}"
